name: check-bedrock-models

# Weekly Bedrock manifest drift check. Compares src/adapters/bedrock/manifest.ts
# against AWS's live lifecycle data; opens a PR if any model is now LEGACY but
# not yet flagged deprecated.
#
# IAM permissions required on the AWS credentials:
#   - bedrock:ListFoundationModels
#   - bedrock:ListInferenceProfiles
# Both are read-only. No model data is accessed.

on:
  schedule:
    - cron: '0 9 * * 1'   # Mondays 09:00 UTC
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # peter-evans/create-pull-request writes the branch
      pull-requests: write   # …and opens the PR
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - run: npm ci

      - name: Run drift checker with --write
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: npm run check:bedrock-models -- --write

      - name: Open PR if manifest changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(bedrock): auto-mark legacy models deprecated'
          title: 'chore(bedrock): mark legacy models deprecated per AWS lifecycle'
          body: |
            AWS Bedrock has marked one or more models in our manifest as
            `LEGACY`. This PR flags them `deprecated: true`.

            Generated by `.github/workflows/check-bedrock-models.yml`.
            Review the diff and merge if correct.
          branch: chore/bedrock-model-deprecations
          delete-branch: true
          labels: automated,dependencies
