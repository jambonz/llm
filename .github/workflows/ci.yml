name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + contract tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package exports smoke (ESM)
        run: node -e "import('./dist/index.js').then(m => { if (typeof m.createLlm !== 'function') throw new Error('createLlm missing from ESM'); console.log('ESM exports OK'); })"

      - name: Package exports smoke (CJS)
        run: node -e "const m = require('./dist/index.cjs'); if (typeof m.createLlm !== 'function') throw new Error('createLlm missing from CJS'); console.log('CJS exports OK');"

  integration:
    name: Integration (live vendor APIs)
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_SERVICE_KEY: ${{ secrets.GOOGLE_SERVICE_KEY }}
          VERTEX_SERVICE_KEY: ${{ secrets.VERTEX_SERVICE_KEY }}
          VERTEX_PROJECT_ID: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: npm run test:integration
